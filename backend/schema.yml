components:
  schemas:
    AddCartItem:
      type: object
      properties:
        variant_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
      required:
      - quantity
      - variant_id
    AddWishlistItem:
      type: object
      properties:
        product:
          type: string
          format: uuid
        variant:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          maxLength: 500
      required:
      - product
    Address:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        full_name:
          type: string
          maxLength: 150
        phone:
          type: string
          maxLength: 32
        line1:
          type: string
          maxLength: 255
        line2:
          type: string
          maxLength: 255
        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 100
        postal_code:
          type: string
          maxLength: 32
        country:
          type: string
          maxLength: 100
        is_default:
          type: boolean
      required:
      - city
      - country
      - full_name
      - id
      - line1
      - phone
      - postal_code
    AdminApproveReturn:
      type: object
      properties:
        resolution:
          $ref: '#/components/schemas/ReturnResolution'
        refund_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
        admin_notes:
          type: string
          maxLength: 2000
      required:
      - resolution
    AdminCancelOrder:
      type: object
      properties:
        reason:
          type: string
          maxLength: 2000
    AdminCategory:
      type: object
      properties:
